<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges" role="img" aria-label="ROLLguelike">
  <title>ROLLguelike</title>
  <!-- shrine background -->
  <rect width="64" height="64" fill="#05050c"/>
  <rect x="1" y="1" width="62" height="62" fill="#0a0a18"/>

  <!-- gold castle-wall frame (top row crenellations) -->
  <rect x="0" y="0"  width="64" height="3" fill="#ffd86b"/>
  <rect x="0" y="3"  width="3"  height="3" fill="#ffd86b"/>
  <rect x="8" y="3"  width="3"  height="3" fill="#ffd86b"/>
  <rect x="16" y="3" width="3"  height="3" fill="#ffd86b"/>
  <rect x="24" y="3" width="3"  height="3" fill="#ffd86b"/>
  <rect x="32" y="3" width="3"  height="3" fill="#ffd86b"/>
  <rect x="40" y="3" width="3"  height="3" fill="#ffd86b"/>
  <rect x="48" y="3" width="3"  height="3" fill="#ffd86b"/>
  <rect x="56" y="3" width="3"  height="3" fill="#ffd86b"/>
  <rect x="61" y="3" width="3"  height="3" fill="#ffd86b"/>
  <!-- side pillars -->
  <rect x="0"  y="6"  width="3" height="52" fill="#ffd86b"/>
  <rect x="61" y="6"  width="3" height="52" fill="#8a5a00"/>
  <!-- bottom row -->
  <rect x="0" y="58" width="64" height="3" fill="#8a5a00"/>
  <rect x="0" y="61" width="64" height="3" fill="#553200"/>

  <!-- die body (cream) -->
  <rect x="12" y="12" width="40" height="40" fill="#f0ecd8"/>
  <!-- top/left highlight -->
  <rect x="12" y="12" width="40" height="3" fill="#ffffff"/>
  <rect x="12" y="12" width="3"  height="40" fill="#ffffff"/>
  <!-- bottom/right shadow -->
  <rect x="12" y="49" width="40" height="3" fill="#8a5a00"/>
  <rect x="49" y="12" width="3"  height="40" fill="#8a5a00"/>
  <!-- inner bevel -->
  <rect x="15" y="15" width="34" height="1" fill="#ffffff"/>
  <rect x="15" y="48" width="34" height="1" fill="#d4a24a"/>

  <!-- 5-pip face: 4 dark corners + red center (the player) -->
  <rect x="19" y="19" width="7" height="7" fill="#1a1a3a"/>
  <rect x="20" y="20" width="2" height="2" fill="#3b3f4c"/>
  <rect x="38" y="19" width="7" height="7" fill="#1a1a3a"/>
  <rect x="39" y="20" width="2" height="2" fill="#3b3f4c"/>
  <rect x="19" y="38" width="7" height="7" fill="#1a1a3a"/>
  <rect x="20" y="39" width="2" height="2" fill="#3b3f4c"/>
  <rect x="38" y="38" width="7" height="7" fill="#1a1a3a"/>
  <rect x="39" y="39" width="2" height="2" fill="#3b3f4c"/>
  <!-- red center pip w/ highlight -->
  <rect x="28" y="28" width="8" height="8" fill="#e23c4c"/>
  <rect x="29" y="29" width="3" height="3" fill="#ff8a9a"/>
  <rect x="28" y="35" width="8" height="1" fill="#8a1e1e"/>
</svg>
