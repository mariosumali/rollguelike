<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a12" />
    <meta name="color-scheme" content="dark" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ROLLguelike" />
    <meta name="application-name" content="ROLLguelike" />

    <title>ROLLguelike — Tap the die. Bend the odds. Survive the shrine.</title>
    <meta name="description" content="A pocket-sized dice-rolling roguelite. Roll the die, auto-aim attacks, stack ridiculous upgrades, survive endless waves." />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="mask-icon" href="/icon.svg" color="#ffd86b" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Pixel typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Silkscreen:wght@400;700&family=VT323&display=swap"
    />

    <!-- Canonical -->
    <link rel="canonical" href="https://rollguelike.vercel.app/" />

    <!--
      Social sharing meta. Single og:image only — iMessage (and a few other
      clients) will stitch or mis-crop when multiple og:image tags are
      present, so we declare exactly one, cropped safely for both 1.91:1
      (Twitter/FB/LinkedIn/Discord/Slack) and 1:1 (iMessage/WhatsApp) previews.
      Absolute URLs are required for iMessage to fetch the image reliably.
    -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ROLLguelike" />
    <meta property="og:url" content="https://rollguelike.vercel.app/" />
    <meta property="og:title" content="ROLLguelike — Tap the die. Bend the odds. Survive the shrine." />
    <meta property="og:description" content="A pocket-sized dice-rolling roguelite. Auto-aim attacks, stacking upgrades, endless waves — built for one thumb." />
    <meta property="og:locale" content="en_US" />

    <meta property="og:image" content="https://rollguelike.vercel.app/og-image.png" />
    <meta property="og:image:secure_url" content="https://rollguelike.vercel.app/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="ROLLguelike — pixel-art die logo with gold shrine frame." />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ROLLguelike" />
    <meta name="twitter:description" content="Tap the die. Bend the odds. Survive the shrine." />
    <meta name="twitter:image" content="https://rollguelike.vercel.app/og-image.png" />
    <meta name="twitter:image:alt" content="ROLLguelike pixel-art die logo." />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
